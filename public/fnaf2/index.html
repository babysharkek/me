<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/fnaf@latest/2/">
    <link rel="stylesheet" type="text/css" href="style.css"/>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, target-densitydpi=device-dpi" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="HandheldFriendly" content="true" />
    <title>Five Nights at Freddy's 2</title>
    <style>
        body { background-color: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: "Courier New", Courier, monospace; color: #cbd5e1; }
        #progress-container { position: absolute; width: 320px; text-align: left; padding: 20px; }
        #loading-text { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; color: #64748b; animation: pulse 1.5s infinite ease-in-out; }
        .bar-outline { width: 100%; height: 2px; background: #1e293b; position: relative; }
        #unified-bar { height: 100%; background: #38bdf8; width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 12px rgba(56,189,248,0.5); }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        #download-text, #extract-text, #download-bar, #extract-bar { display: none; }
    </style>
</head>
<body>
    <div style="display: inline-block; -webkit-user-select: none; text-align: left">
        <canvas id="MMFCanvas" width="1280" height="720"> Your browser does not support Canvas. </canvas>
    </div>
    <div id="progress-container">
        <div id="loading-text">Initializing Grand Re-opening...</div>
        <div class="bar-outline"><div id="unified-bar"></div></div>
        <span id="download-text"></span>
        <span id="extract-text"></span>
        <div id="download-bar"></div>
        <div id="extract-bar"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const unifiedBar = document.getElementById('unified-bar');
        const loadingLabel = document.getElementById('loading-text');
        const observer = new MutationObserver(() => {
            const dl = parseInt(document.getElementById('download-text').innerText) || 0;
            const ex = parseInt(document.getElementById('extract-text').innerText) || 0;
            const totalProgress = (dl * 0.5) + (ex * 0.5);
            unifiedBar.style.width = totalProgress + '%';
            if (dl >= 100 && ex < 100) loadingLabel.innerText = "Syncing Facial Recognition...";
            if(totalProgress >= 100) {
                setTimeout(() => {
                    document.getElementById('progress-container').style.opacity = '0';
                    setTimeout(() => { document.getElementById('progress-container').style.display = 'none'; }, 500);
                }, 500);
            }
        });
        observer.observe(document.getElementById('download-text'), { childList: true });
        observer.observe(document.getElementById('extract-text'), { childList: true });
    </script>
    <script src="main.js"></script>
</body>
</html>
