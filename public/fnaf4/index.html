<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/fnaf@latest/4/">
    <link rel="stylesheet" type="text/css" href="style.css"/>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, target-densitydpi=device-dpi" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="HandheldFriendly" content="true" />
    <title>Five Nights at Freddy's 4</title>
    <style>
        body { background-color: #000; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: serif; color: #333; }
        #progress-container { position: absolute; width: 280px; text-align: center; }
        #status-label { font-size: 16px; font-style: italic; letter-spacing: 5px; margin-bottom: 20px; color: #444; animation: breathe 4s ease-in-out infinite; }
        .bar-container { width: 100%; height: 1px; background: #111; position: relative; }
        #unified-bar { height: 100%; background: #800000; width: 0%; transition: width 0.6s ease-in-out; box-shadow: 0 0 10px #4d0000; }
        @keyframes breathe {
            0%, 100% { opacity: 0.2; transform: scale(0.98); }
            50% { opacity: 0.8; transform: scale(1); color: #666; }
        }
        #download-text, #extract-text, #download-bar, #extract-bar { display: none; }
    </style>
</head>
<body>
    <div style="display: inline-block; -webkit-user-select: none; text-align: left">
        <canvas id="MMFCanvas" width="1280" height="720"> Your browser does not support Canvas. </canvas>
    </div>
    <div id="progress-container">
        <div id="status-label">Listen closely...</div>
        <div class="bar-container"><div id="unified-bar"></div></div>
        <span id="download-text"></span>
        <span id="extract-text"></span>
        <div id="download-bar"></div>
        <div id="extract-bar"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const unifiedBar = document.getElementById('unified-bar');
        const statusLabel = document.getElementById('status-label');
        const observer = new MutationObserver(() => {
            const dl = parseInt(document.getElementById('download-text').innerText) || 0;
            const ex = parseInt(document.getElementById('extract-text').innerText) || 0;
            const totalProgress = (dl * 0.5) + (ex * 0.5);
            unifiedBar.style.width = totalProgress + '%';
            if (dl >= 100 && ex < 100) statusLabel.innerText = "Something is inside...";
            if(totalProgress >= 100) {
                statusLabel.innerText = "Don't turn around.";
                setTimeout(() => {
                    document.getElementById('progress-container').style.opacity = '0';
                    setTimeout(() => { document.getElementById('progress-container').style.display = 'none'; }, 1000);
                }, 1000);
            }
        });
        observer.observe(document.getElementById('download-text'), { childList: true });
        observer.observe(document.getElementById('extract-text'), { childList: true });
    </script>
    <script src="main.js"></script>
</body>
</html>
