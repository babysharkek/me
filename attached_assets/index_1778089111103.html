    <script>
        Object.defineProperty(document, 'title', {
            set: function() {},
            get: function() { return 'Home - Classroom'; },
            configurable: false
        });
    </script>

    <style>
        :root {
            --bg-glass: rgba(255, 255, 255, 0.08);
            --bg-glass-hover: rgba(255, 255, 255, 0.18);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
        }

        .title {
            font-size: 3.5rem !important;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        .search-container {
            width: 100%;
            max-width: 650px;
            margin: 0 auto 30px auto;
        }

        #input {
            width: 100%;
            padding: 18px 25px !important;
            font-size: 1.2rem !important;
            border-radius: 15px !important;
            border: 2px solid var(--border-glass);
            background: rgba(255, 255, 255, 0.07);
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
        }

        #input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .quick-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .quick-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 110px;
            height: 110px;
            border-radius: 16px;
            padding: 10px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            background: var(--bg-glass);
            color: var(--text-main);
            text-decoration: none;
        }

        .quick-link:hover {
            transform: translateY(-5px);
            background: var(--bg-glass-hover);
        }

        .quick-link i, .quick-link img {
            font-size: 2.2rem !important;
            width: 40px !important;
            height: 40px !important;
            margin-bottom: 10px;
            object-fit: contain;
        }

        .quick-link span {
            font-size: 14px;
        }

        /* Tubi icon slightly larger without touching the card/text */
        .quick-link img[alt="Tubi"] {
            width: 54px !important;
            height: 54px !important;
        }

        body {
            background: linear-gradient(to bottom, #111, #000) !important;
        }

        #particles-js { background: transparent !important; }

        /* Lock scroll & hide scrollbar on home page */
        html, body {
            overflow: hidden !important;
            height: 100%;
            width: 100%;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
    </style>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6840529569014734" crossorigin="anonymous"></script>
</head>

<body class="center">

    <div id="particles-js">

        <div class="main">
            <h1 class="title">Star Proxy</h1>
            <p id="splash" style="cursor:pointer;opacity:0.5;font-size:0.85rem;letter-spacing:0.08em;margin:-18px 0 22px;text-align:center;transition:opacity 0.2s;" onmouseenter="this.style.opacity=0.9" onmouseleave="this.style.opacity=0.5"></p>

            <div class="search-container">
                <form id="fv" method="POST">
                    <input id="input" class="truncate" placeholder="Search or enter a URL" type="text" autocomplete="off" />
                </form>
            </div>

            <div class="quick-links">
                <button class="quick-link" onclick="go('https://youtube.com')">
                    <i class="fa-brands fa-youtube" style="color:#ff0000;"></i>

                <button class="quick-link" onclick="go('https://tiktok.com')">

                <button class="quick-link" onclick="go('https://gemini.google.com')">

                </button>

                <button class="quick-link" onclick="go('https://tubitv.com')">
                    <img src="/images/tubi.png" alt="Tubi" style="border-radius:5px;">
                    <span>Tubi TV</span>

                <!-- Vudu replaced with FlixBaba here -->
                <button class="quick-link" onclick="go('https://flixbaba.mov/')">

                </button>

                <button class="quick-link" onclick="go('https://justanime.to/')">

                </button>
            </div>
        </div>
    </div>

    <script>
      (async () => {
        try {
          const wispUrl = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/wisp/';
          const conn = new BareMux.BareMuxConnection('/assets/transport/bare-worker.js');
          const cur = await conn.getTransport().catch(() => null);
          if (!cur || cur === 'null') await conn.setTransport('/assets/transport/epoxy.js', [{ wisp: wispUrl }]);
        } catch (_) {}
      })();
    </script>
